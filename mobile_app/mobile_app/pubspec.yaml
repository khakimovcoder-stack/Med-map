name: shifo_radar
description: "Med Map — Hospital bed availability crowdsourcing platform for Uzbekistan."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  dio: ^5.7.0
  mobile_scanner: ^5.2.3
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  lucide_icons: ^0.257.0
  google_fonts: ^6.2.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
